<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h1, initial-scale=1.0">
    <link rel="stylesheet" href="registration.css">
    <title> Registration </title>
</head>
<body>

    <div class="main">

        <marquee behavior="alternate" direction="right"> Welcome To Registration Page </marquee>
        <br>

        <div class="container">

            <h1> Register </h1>
            <br><br>

            <form action="index.html">

                <input type="text" placeholder="Name" name="name" class="in1" required >
                <input type="text" placeholder="Surname" name="surname" class="in1" required>
                <br><br>
                
                <input type="tel" placeholder="Phone Number" name="phon.No" class="in2" required>
                <br><br>

                <input type="email" placeholder="Email" class="in2" required>
                <br><br>

                <input type="password" placeholder="password" name="password" class="in2" required>
                <br><br>

                <input type="password" placeholder="Confirm password" class="in2" name="Confirm password" required>
                <br><br><br><br>

                <button type="submit"> Register </button>

            </form>

        </div>

    </div>
    
</body>
</html>
